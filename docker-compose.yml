# oaao.ai-v1 — run PostgreSQL + PHP/Apache locally without global installs.
#
# Prerequisites:
#   1. Copy Razy.phar into backbone/ next to backbone/config.inc.php (not committed—ship separately).
#   2. From repo root:
#        cp docker/env.example .env       # edit if needed
#        docker compose --profile vectors up --build -d   # vault embed / RAG needs qdrant
#        docker compose --profile lance up -d --build lance   # mm_lance stub (any host)
#        docker compose --profile lance-cuda up -d --build lance-cuda   # CUDA dev (pipeline TBD)
#        # MLX dev (Mac): run MLX sidecar on host — see docker/env.mlx-dev.example
#        # chat-only (no vault vectors): docker compose up --build -d
#
# Open: http://localhost:${OAAO_WEB_PORT:-8080}/  (DocumentRoot is backbone/, not /backbone on the URL path.)
# Platform admin console (tenant control plane — no AI/chat): http://admin.localhost:${OAAO_WEB_PORT:-8080}/
# Override hostname: OAAO_PLATFORM_ADMIN_HOST=ops.example.com (also map in /etc/hosts or DNS)
#   127.0.0.1 admin.localhost
#
# Intra-stack URLs: orchestrator → PHP uses `http://web/…`, DB → `postgres`, web search → `http://searxng:8080`, Qdrant → `http://qdrant:6333` (--profile vectors).
# From inside a container `localhost` is that container alone; target another compose service by its **Compose service name** and the port it listens on **inside Docker**.
# If the model runs on the host machine instead, use `host.docker.internal:<host-port>` from the orchestrator container.
#
# By default `web` bind-mounts `./backbone` so sites/webassets edits apply without rebuilding the image.
# After changing `sites.inc.php` or host env (`OAAO_APEX_DOMAIN`, …), entrypoint runs `php Razy.phar rewrite`
# so `/webassets/*` Apache rules match production domains. Non-Docker: run the same from `backbone/`.
# Pure image-only deploy: comment out `./backbone:/var/www/html` under `web.volumes`, then `docker compose build web --no-cache && docker compose up -d web`.
#
# Postgres: localhost:${OAAO_PG_HOST_PORT:-5432}  user/pass/db → see .env defaults
#
# First-run install in Docker: PostgreSQL connection comes from OAAO_PG_URL; the URL field stays behind Advanced.
#
# `./backbone/config/oaaoai` is bind-mounted so `auth.php` (`installed`, DB credentials) survives `docker compose build`.
# Without it, each rebuild resets the image copy of auth.php to `installed => false` while Postgres data may still exist.
#
# Postgres / adjunct SQLite / vault files / (with `--profile vectors`) Qdrant + Arango data dirs are **host bind mounts** — point at NAS or other paths in `.env`.
#   OAAO_PG_DATA_PATH, OAAO_AUTH_SQLITE_PATH, OAAO_VAULT_STORAGE_HOST_PATH, OAAO_QDRANT_DATA_PATH, OAAO_ARANGO_DATA_PATH (see docker/env.example).
# Migrating from old Docker named volumes (`oaaoai_v1_pg`, `oaaoai_v1_auth_local`, or vectors `oaaoai_v1_qdrant` / `oaaoai_v1_arango`): copy contents into the chosen host dirs (or docker cp) before relying on binds.
#
# Backup: durable state lives on host paths referenced here (repos may use NAS mount points instead of `./docker/data/…`).
# Image/container removal does not delete bind-mounted host dirs — point them at locations you snapshot
# (`aws s3 sync`, `rclone`, NAS, etc.). Also back up `./backbone/config/oaaoai` (installed + DB + sqlite_local paths).
# For PostgreSQL, periodic `pg_dump` (logical) in addition to copying OAAO_PG_DATA_PATH is recommended.

name: oaaoai-v1

# Compose loads `.env` from repo root by default; this repo keeps vars in `docker/env`.
x-oaao-env: &oaao-env
  env_file:
    - docker/env

x-lance-sidecar: &lance_sidecar
  build:
    context: .
    dockerfile: docker/lance_adapter/Dockerfile
  restart: unless-stopped
  ports:
    - '${OAAO_LANCE_HOST_PORT:-8787}:8787'
  volumes:
    - ${OAAO_VAULT_STORAGE_HOST_PATH:-./docker/data/vault}:${OAAO_VAULT_STORAGE:-/var/www/html/storage/vault}

services:
  postgres:
    <<: *oaao-env
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${OAAO_PG_DB:-oaao}
      POSTGRES_USER: ${OAAO_PG_USER:-oaao}
      POSTGRES_PASSWORD: ${OAAO_PG_PASSWORD:-oaao_dev}
      LANG: C.UTF-8
    volumes:
      - ${OAAO_PG_DATA_PATH:-./docker/data/postgres}:/var/lib/postgresql/data
    ports:
      - '${OAAO_PG_HOST_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${OAAO_PG_USER:-oaao} -d ${OAAO_PG_DB:-oaao}']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  web:
    <<: *oaao-env
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      # Vault job poll is orchestrator → PHP (`http://web/vault/api`). Do not wait for orchestrator health —
      # that delayed `web` ~25s and caused startup DNS noise in orchestrator logs. Chat SSE tolerates a brief cold sidecar.
      orchestrator:
        condition: service_started
    ports:
      - '${OAAO_WEB_PORT:-9080}:80'
    environment:
      # Install wizard + PHP auth (must use Docker service hostname `postgres`, not localhost)
      OAAO_PG_URL: ${OAAO_PG_URL:-postgresql://oaao:oaao_dev@postgres:5432/oaao}
      OAAO_SIDECAR_PORT: ${OAAO_SIDECAR_PORT:-8103}
      OAAO_DOCKER: '1'
      OAAO_ORCHESTRATOR_INTERNAL_URL: ${OAAO_ORCHESTRATOR_INTERNAL_URL:-http://orchestrator:8103}
      OAAO_ORCHESTRATOR_PUBLIC_BASE: ${OAAO_ORCHESTRATOR_PUBLIC_BASE:-http://localhost:${OAAO_SIDECAR_PORT:-8103}}
      OAAO_ORCHESTRATOR_SIDECAR_PATH: ${OAAO_ORCHESTRATOR_SIDECAR_PATH:-/sidecar}
      OAAO_PUBLIC_HTTPS: ${OAAO_PUBLIC_HTTPS:-}
      OAAO_ORCH_SHARED_SECRET: ${OAAO_ORCH_SHARED_SECRET:?OAAO_ORCH_SHARED_SECRET is required (set in docker/env or your secret manager)}
      # Host routing (OAAO_APEX_DOMAIN, OAAO_CUSTOMER_HOSTS, OAAO_PLATFORM_*): set in docker/env — do not override here with empty defaults.
      OAAO_VAULT_STORAGE: ${OAAO_VAULT_STORAGE:-/var/www/html/storage/vault}
      OAAO_CORPUS_STORAGE: ${OAAO_CORPUS_STORAGE:-/var/www/html/storage/corpus}
      OAAO_MINE_DATA_ROOT: ${OAAO_MINE_DATA_ROOT:-/var/www/html/storage/mine}
      OAAO_QDRANT_URL: ${OAAO_QDRANT_URL:-http://qdrant:6333}
      OAAO_ARANGO_URL: ${OAAO_ARANGO_URL:-http://arangodb:8529}
      OAAO_ARANGO_DATABASE: ${OAAO_ARANGO_DATABASE:-oaao_vault}
      OAAO_ARANGO_USER: ${OAAO_ARANGO_USER:-root}
      OAAO_ARANGO_PASSWORD: ${OAAO_ARANGO_PASSWORD:-${ARANGO_ROOT_PASSWORD:-oaao_dev_arango}}
      # Optional: adjunct SQLite file inside the container (writable layer). Use when auth/data bind mount is root-owned on the host.
      OAAO_ADJUNCT_SQLITE: ${OAAO_ADJUNCT_SQLITE:-}
      OAAO_SLIDE_PROJECT_ROOT: ${OAAO_SLIDE_PROJECT_ROOT:-/var/www/html/sites/oaaoai/oaaoai/auth/data/slide-projects}
      OAAO_SLIDE_TEMPLATE_CUSTOM_ROOT: ${OAAO_SLIDE_TEMPLATE_CUSTOM_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/slide-templates/custom}
      OAAO_AUTH_SQLITE_PATH: ${OAAO_AUTH_SQLITE_CONTAINER:-/var/www/html/sites/oaaoai/oaaoai/auth/data/oaao_local.sqlite}
      OAAO_TRANSCRIPT_SUMMARY_TEMPLATES_DIR: ${OAAO_TRANSCRIPT_SUMMARY_TEMPLATES_DIR:-/var/www/html/config/transcript-summary-templates}
      OAAO_LIVE_MEETING_ROOT: ${OAAO_LIVE_MEETING_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/live-meeting}
      OAAO_BENCH_PROBE: ${OAAO_BENCH_PROBE:-}
      OAAO_SEARXNG_URL: ${OAAO_SEARXNG_URL:-http://searxng:8080}
    volumes:
      # First: full host tree (`sites/`, `.htaccess`, Razy.phar). Later lines overlay config, adjunct DB, vault.
      # Image-only mode: comment this line out and rely on Dockerfile COPY after `docker compose build web`.
      - ./backbone:/var/www/html
      # Auth runtime config — explicit bind keeps install state obvious; same paths also exist under `./backbone`.
      - ./backbone/config/oaaoai:/var/www/html/config/oaaoai
      # Adjunct SQLite (token usage, local history, training) — host path configurable via `.env`.
      - ${OAAO_AUTH_SQLITE_PATH:-./docker/data/auth-local}:/var/www/html/sites/oaaoai/oaaoai/auth/data
      # Slide designer on-disk projects — shared with orchestrator (SD-3).
      - ${OAAO_SLIDE_PROJECT_PATH:-./docker/data/slide-projects}:/var/www/html/sites/oaaoai/oaaoai/auth/data/slide-projects
      # Slide template PPTX + render PNG + scoped JSON (Razy distributor data/).
      - ${OAAO_SLIDE_TEMPLATE_PATH:-./docker/data/slide-templates}:/var/www/html/sites/oaaoai/oaaoai/data/slide-templates
      # Vault binaries — shared with orchestrator when ingest reads payloads by absolute filesystem path.
      - ${OAAO_VAULT_STORAGE_HOST_PATH:-./docker/data/vault}:${OAAO_VAULT_STORAGE:-/var/www/html/storage/vault}
      # Corpus uploads — shared with orchestrator for analyze text extraction (overlay when host path ≠ ./backbone/storage/corpus).
      - ${OAAO_CORPUS_STORAGE_HOST_PATH:-./backbone/storage/corpus}:${OAAO_CORPUS_STORAGE:-/var/www/html/storage/corpus}
      - ${OAAO_MINE_DATA_HOST_PATH:-./docker/data/mine}:${OAAO_MINE_DATA_ROOT:-/var/www/html/storage/mine}
      # Transcript summary prompt templates (HiNote-style) — edit .md on host, reload dialog.
      - ${OAAO_TRANSCRIPT_SUMMARY_TEMPLATES_PATH:-./docker/transcript-summary-templates}:/var/www/html/config/transcript-summary-templates:ro
      - ${OAAO_LIVE_MEETING_HOST_PATH:-./docker/data/live-meeting}:${OAAO_LIVE_MEETING_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/live-meeting}

  # Meta-search for web_search agent + knowledge refresh (JSON API). Default on — cloud SKU includes live web.
  searxng:
    <<: *oaao-env
    image: docker.io/searxng/searxng:${OAAO_SEARXNG_VERSION:-latest}
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: ${OAAO_SEARXNG_BASE_URL:-http://searxng:8080/}
      SEARXNG_SECRET: ${OAAO_SEARXNG_SECRET:-oaao_dev_searxng_secret}
    volumes:
      - ./docker/searxng:/etc/searxng:ro
    ports:
      - '${OAAO_SEARXNG_HOST_PORT:-8088}:8080'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q --spider http://127.0.0.1:8080/ || exit 1',
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  orchestrator:
    <<: *oaao-env
    build:
      context: .
      dockerfile: docker/orchestrator/Dockerfile
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_started
    ports:
      - '${OAAO_SIDECAR_PORT:-8103}:8103'
    environment:
      OAAO_DOCKER: '1'
      OAAO_ORCH_SHARED_SECRET: ${OAAO_ORCH_SHARED_SECRET:?OAAO_ORCH_SHARED_SECRET is required (set in docker/env or your secret manager)}
      OAAO_VAULT_JOB_POLL_BASE_URL: ${OAAO_VAULT_JOB_POLL_BASE_URL:-http://web/vault/api}
      OAAO_VAULT_JOB_POLL_INTERVAL_SEC: ${OAAO_VAULT_JOB_POLL_INTERVAL_SEC:-4}
      OAAO_VAULT_JOB_STUB_MODE: ${OAAO_VAULT_JOB_STUB_MODE:-fail}
      OAAO_CORPUS_STORAGE: ${OAAO_CORPUS_STORAGE:-/var/www/html/storage/corpus}
      OAAO_CORPUS_JOB_STORE_DIR: ${OAAO_CORPUS_JOB_STORE_DIR:-/var/www/html/storage/orchestrator-corpus-jobs}
      OAAO_AGENT_MATERIAL_ROOT: ${OAAO_AGENT_MATERIAL_ROOT:-/var/www/html/storage/agent-materials}
      OAAO_FUNASR_BASE_URL: ${OAAO_FUNASR_BASE_URL:-http://funasr:8765}
      OAAO_FUNASR_COMPOSE_ENABLED: ${OAAO_FUNASR_COMPOSE_ENABLED:-1}
      OAAO_LANCE_BASE_URL: ${OAAO_LANCE_BASE_URL:-http://lance:8787}
      OAAO_COMPOSE_PROJECT_DIR: /compose
      OAAO_COMPOSE_PROJECT_NAME: ${OAAO_COMPOSE_PROJECT_NAME:-oaaoai-v1}
      OAAO_DOCKER_SOCKET: /var/run/docker.sock
      OAAO_QDRANT_URL: ${OAAO_QDRANT_URL:-http://qdrant:6333}
      OAAO_QDRANT_DEFAULT_COLLECTION: ${OAAO_QDRANT_DEFAULT_COLLECTION:-}
      OAAO_ARANGO_URL: ${OAAO_ARANGO_URL:-http://arangodb:8529}
      OAAO_ARANGO_DATABASE: ${OAAO_ARANGO_DATABASE:-oaao_vault}
      OAAO_ARANGO_USER: ${OAAO_ARANGO_USER:-root}
      OAAO_ARANGO_PASSWORD: ${OAAO_ARANGO_PASSWORD:-${ARANGO_ROOT_PASSWORD:-oaao_dev_arango}}
      # Vault embed + chat RAG: embedding URL/model come from PostgreSQL Purpose→Endpoint (PHP). Optional protocol hint for Ollama-native JSON:
      OAAO_EMBEDDING_NATIVE_OLLAMA: ${OAAO_EMBEDDING_NATIVE_OLLAMA:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Chat completion output cap when profile/endpoint config_json omits max_tokens (e.g. 8192).
      OAAO_CHAT_MAX_TOKENS: ${OAAO_CHAT_MAX_TOKENS:-8192}
      OAAO_SSE_KEEPALIVE_SEC: ${OAAO_SSE_KEEPALIVE_SEC:-15}
      OAAO_SLIDE_PROJECT_ROOT: ${OAAO_SLIDE_PROJECT_ROOT:-/var/www/html/sites/oaaoai/oaaoai/auth/data/slide-projects}
      OAAO_SLIDE_TEMPLATE_CUSTOM_ROOT: ${OAAO_SLIDE_TEMPLATE_CUSTOM_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/slide-templates/custom}
      OAAO_FONT_CACHE_DIR: ${OAAO_FONT_CACHE_DIR:-/var/oaao/font-cache}
      OAAO_AUTH_SQLITE_PATH: ${OAAO_AUTH_SQLITE_CONTAINER:-/var/www/html/sites/oaaoai/oaaoai/auth/data/oaao_local.sqlite}
      OAAO_PG_URL: postgresql://${OAAO_PG_USER:-oaao}:${OAAO_PG_PASSWORD:-oaao_dev}@postgres:5432/${OAAO_PG_DB:-oaao}
      OAAO_VAULT_JOB_CLAIM_MODE: ${OAAO_VAULT_JOB_CLAIM_MODE:-auto}
      OAAO_VAULT_JOB_WORKERS: ${OAAO_VAULT_JOB_WORKERS:-5}
      OAAO_CHAT_PERSIST_MODE: ${OAAO_CHAT_PERSIST_MODE:-auto}
      OAAO_QUEUE_POOLS_JSON: ${OAAO_QUEUE_POOLS_JSON:-/app/python/config/queue_pools.docker.json}
      OAAO_QUEUE_BACKEND: ${OAAO_QUEUE_BACKEND:-memory}
      OAAO_QUEUE_REDIS_URL: ${OAAO_QUEUE_REDIS_URL:-}
      OAAO_VAULT_INGEST_SSE_POLL_SEC: ${OAAO_VAULT_INGEST_SSE_POLL_SEC:-2.5}
      OAAO_LIVE_MEETING_ROOT: ${OAAO_LIVE_MEETING_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/live-meeting}
      OAAO_POLISH_TEMPLATES_DIR: ${OAAO_POLISH_TEMPLATES_DIR:-/app/config/polish-templates}
      OAAO_MINE_DATA_ROOT: ${OAAO_MINE_DATA_ROOT:-/var/www/html/storage/mine}
      # Knowledge bucket cron (WS-1-S6) — POST /endpoints/api/knowledge_cron_run → reads Settings → /v1/knowledge/refresh
      OAAO_KNOWLEDGE_CRON_POLL_INTERVAL_SEC: ${OAAO_KNOWLEDGE_CRON_POLL_INTERVAL_SEC:-3600}
      OAAO_KNOWLEDGE_REFRESH_USER_ID: ${OAAO_KNOWLEDGE_REFRESH_USER_ID:-}
      OAAO_KNOWLEDGE_TENANT_VAULT_ID: ${OAAO_KNOWLEDGE_TENANT_VAULT_ID:-}
      OAAO_KNOWLEDGE_PLATFORM_VAULT_ID: ${OAAO_KNOWLEDGE_PLATFORM_VAULT_ID:-}
      OAAO_SEARXNG_URL: ${OAAO_SEARXNG_URL:-http://searxng:8080}
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:8103/openapi.json", timeout=3).read(1)',
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 25s
    volumes:
      - ${OAAO_VAULT_STORAGE_HOST_PATH:-./docker/data/vault}:${OAAO_VAULT_STORAGE:-/var/www/html/storage/vault}
      - ${OAAO_CORPUS_STORAGE_HOST_PATH:-./backbone/storage/corpus}:${OAAO_CORPUS_STORAGE:-/var/www/html/storage/corpus}
      - ${OAAO_CORPUS_JOB_STORE_HOST_PATH:-./docker/data/orchestrator-corpus-jobs}:${OAAO_CORPUS_JOB_STORE_DIR:-/var/www/html/storage/orchestrator-corpus-jobs}
      - ${OAAO_AGENT_MATERIAL_HOST_PATH:-./backbone/storage/agent-materials}:${OAAO_AGENT_MATERIAL_ROOT:-/var/www/html/storage/agent-materials}
      - ${OAAO_MINE_DATA_HOST_PATH:-./docker/data/mine}:${OAAO_MINE_DATA_ROOT:-/var/www/html/storage/mine}
      - ${OAAO_SLIDE_PROJECT_PATH:-./docker/data/slide-projects}:/var/www/html/sites/oaaoai/oaaoai/auth/data/slide-projects
      - ${OAAO_SLIDE_TEMPLATE_PATH:-./docker/data/slide-templates}:/var/www/html/sites/oaaoai/oaaoai/data/slide-templates
      - ${OAAO_FONT_CACHE_PATH:-./docker/data/font-cache}:/var/oaao/font-cache
      # Adjunct SQLite + legacy slide-templates under auth/data (orchestrator still reads if present).
      - ${OAAO_AUTH_SQLITE_PATH:-./docker/data/auth-local}:/var/www/html/sites/oaaoai/oaaoai/auth/data
      # Built-in FunASR: orchestrator can `docker compose --profile funasr up` when Settings enables Speaker mode.
      - ${OAAO_COMPOSE_PROJECT_DIR:-.}:/compose:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OAAO_LIVE_MEETING_HOST_PATH:-./docker/data/live-meeting}:${OAAO_LIVE_MEETING_ROOT:-/var/www/html/sites/oaaoai/oaaoai/data/live-meeting}
      # ASR polish template prompts — edit .md on host, no orchestrator rebuild.
      - ${OAAO_POLISH_TEMPLATES_PATH:-./docker/polish-templates}:${OAAO_POLISH_TEMPLATES_DIR:-/app/config/polish-templates}:ro

  # Optional: vector DB + graph DB for RAG / GraphRAG (`docker compose --profile vectors up`).
  # ── Persist on the host: both use bind-mount paths (`OAAO_*_DATA_PATH`), same pattern as Postgres + vault blobs.
  qdrant:
    image: qdrant/qdrant:v1.12.5
    profiles: ['vectors']
    restart: unless-stopped
    ports:
      - '${QDRANT_HOST_PORT:-6333}:6333'
    volumes:
      - ${OAAO_QDRANT_DATA_PATH:-./docker/data/qdrant}:/qdrant/storage

  arangodb:
    image: arangodb:3.12.4
    profiles: ['vectors']
    restart: unless-stopped
    environment:
      ARANGO_ROOT_PASSWORD: ${ARANGO_ROOT_PASSWORD:-oaao_dev_arango}
    ports:
      - '${ARANGO_HOST_PORT:-8529}:8529'
    volumes:
      - ${OAAO_ARANGO_DATA_PATH:-./docker/data/arango}:/var/lib/arangodb3

  # Optional: minimal FunASR HTTP adapter for Vault Speaker Mode ASR (stub diarization by default).
  # NOT started by plain `docker compose up` — use profile `funasr`:
  #   docker compose --profile funasr up -d --build funasr
  # Settings → ASR → Speaker mode triggers orchestrator ensure (compose build/up when OAAO_FUNASR_COMPOSE_ENABLED=1).
  funasr:
    build:
      context: .
      dockerfile: docker/funasr_adapter/Dockerfile
    profiles: ['funasr']
    restart: unless-stopped
    ports:
      - '${OAAO_FUNASR_HOST_PORT:-8765}:8765'
    environment:
      FUNASR_ADAPTER_MODE: ${FUNASR_ADAPTER_MODE:-stub}
      FUNASR_ASR_MODEL: ${FUNASR_ASR_MODEL:-paraformer-zh}
      FUNASR_SPK_MODEL: ${FUNASR_SPK_MODEL:-}
    volumes:
      - ${OAAO_VAULT_STORAGE_HOST_PATH:-./docker/data/vault}:${OAAO_VAULT_STORAGE:-/var/www/html/storage/vault}

  # W8-S3 Stage 2 — Redis queue canary (`docker compose --profile redis-canary up`).
  # No host port by default — orchestrator uses redis://redis:6379/0 on the compose network.
  # To expose for host redis-cli: set REDIS_HOST_PORT=6380 in docker/env and add ports below.
  redis:
    image: redis:7-alpine
    profiles: ['redis-canary']
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - ${OAAO_REDIS_DATA_PATH:-./docker/data/redis}:/data

  # WS-1-S5/S6 — optional Knowledge refresh tick (Settings → Knowledge). Prefer orchestrator knowledge_cron_poll_loop.
  knowledge-refresh-cron:
    <<: *oaao-env
    profiles: ['knowledge-cron']
    image: curlimages/curl:8.11.1
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
    environment:
      OAAO_ORCH_SHARED_SECRET: ${OAAO_ORCH_SHARED_SECRET:?OAAO_ORCH_SHARED_SECRET is required (set in docker/env or your secret manager)}
      OAAO_KNOWLEDGE_CRON_BASE_URL: ${OAAO_KNOWLEDGE_CRON_BASE_URL:-http://web/endpoints/api}
      OAAO_KNOWLEDGE_CRON_INTERVAL_SEC: ${OAAO_KNOWLEDGE_CRON_POLL_INTERVAL_SEC:-3600}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        while true; do
          curl -fsS -X POST \
            -H "X-OAAO-Internal-Token: $$OAAO_ORCH_SHARED_SECRET" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "$${OAAO_KNOWLEDGE_CRON_BASE_URL%/}/knowledge_cron_run" \
            || echo "[knowledge-refresh-cron] tick failed"
          sleep "$${OAAO_KNOWLEDGE_CRON_INTERVAL_SEC:-3600}"
        done

  # ── Lance mm_lance sidecars (optional profiles) — same HTTP contract POST /v1/task
  # Stub:     docker compose --profile lance up -d --build lance
  # CUDA dev: docker compose --profile lance-cuda up -d --build lance-cuda  (+ OAAO_LANCE_BASE_URL=http://lance-cuda:8787)
  # MLX dev:  host MLX on :8787 — OAAO_LANCE_BASE_URL=http://host.docker.internal:8787 (docker/env.mlx-dev.example)
  lance-cuda:
    <<: *lance_sidecar
    profiles: ['lance-cuda']
    environment:
      LANCE_ADAPTER_MODE: ${LANCE_ADAPTER_MODE:-stub}
      LANCE_DEV_BACKEND: cuda

  lance:
    <<: *lance_sidecar
    profiles: ['lance']
    environment:
