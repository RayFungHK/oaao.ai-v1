name: oaao-ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  bridge-and-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cross-module require gate
        run: bash scripts/audit_cross_module_requires.sh --gate

      - name: PHP syntax (oaaoai)
        run: bash scripts/php_lint_oaaoai.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install CI Python deps
        run: pip install -r python/requirements-ci.txt

      - name: Bridge contract tests
        working-directory: python
        run: python -m pytest tests/test_orchestrator_bridge_contract.py -q

      - name: Hook resilience tests
        working-directory: python
        run: python -m pytest tests/test_pipeline_hook_resilience.py -q

      - name: PHP namespace/use contract
        working-directory: python
        run: python -m pytest tests/test_php_namespace_use_contract.py -q

  orchestrator-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install orchestrator app deps
        run: pip install -r python/requirements-orchestrator-app.txt

      - name: Start app sidecar and smoke (health + chat run)
        working-directory: python
        env:
          OAAO_SMOKE_START_CHAT_RUN: "1"
          # Ephemeral CI secret; not used outside the runner. W3-S1: no default fallback.
          OAAO_ORCH_SHARED_SECRET: ci_smoke_secret_do_not_reuse
        run: |
          python -m uvicorn oaao_orchestrator.app:app --host 127.0.0.1 --port 8103 &
          SIDECAR_PID=$!
          trap 'kill ${SIDECAR_PID} 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8103/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8103/health
          OAAO_ORCHESTRATOR_INTERNAL_URL=http://127.0.0.1:8103 bash ../scripts/oaao_orchestrator_smoke.sh

  audit-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Full-tree cross-module audit
        run: bash scripts/audit_cross_module_requires.sh

      - name: SQL injection guard (W11-S2)
        run: bash scripts/sql_injection_guard.sh

  php-style:
    # W2-S2 — PHP-CS-Fixer style gate.
    # Phase 1 (W2): advisory only (continue-on-error), establish baseline.
    # Phase 2 (later): flip continue-on-error off after baseline is clean.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: Install dev tooling
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: PHP-CS-Fixer (dry-run, advisory)
        continue-on-error: true
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --using-cache=no

  python-lint:
    # W2-S1 — Python lint/format/type gate.
    # W4-S1 Phase 2 (this commit): ruff lint + format → HARD FAIL.
    # Mypy stays advisory (continue-on-error) until type-coverage migration completes.
    # Baseline of 113 legacy violations captured via `ruff check --add-noqa`; new
    # violations break the build. To clear a noqa, fix the issue and remove the marker.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint deps
        run: pip install -r python/requirements-lint.txt

      - name: Ruff format check
        run: ruff format --check python

      - name: Ruff lint
        run: ruff check python

      - name: Mypy (strict islands + base)
        continue-on-error: true
        run: mypy

      - name: Forbid weak default secret literal (W3-S1 guard)
        run: |
          set -e
          MATCHES=$(grep -RIn \
            --exclude-dir=docs \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude='_internal_secret.py' \
            --exclude='oaao-ci.yml' \
            --exclude='env' \
            'oaao_dev_shared_secret' . || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::Weak default secret literal regressed (W3-S1)"
            echo "$MATCHES"
            exit 1
          fi

  security-audit:
    # W11-S3 (Top-20 #18) — Secret scan + dependency audit.
    # Phase 1 (this commit): ADVISORY. Establishes baseline; CI surfaces findings
    #   but does not block merges so we can land the gate without false-positive
    #   churn against the historical tree.
    # Phase 2 (later): flip continue-on-error off for secret-scan (gitleaks) once
    #   .gitleaks.toml allowlist is curated, and for pip-audit/composer-audit once
    #   the dep tree is patched current. See docs/W1_Top20_TechDebt_Owner_Framework.md #18.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to scan blobs

      # --- Secret scan ----------------------------------------------------
      - name: gitleaks (secret scan, advisory)
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          GITLEAKS_ENABLE_COMMENTS: "false"

      # --- Python dependency audit ----------------------------------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (Python deps, advisory)
        continue-on-error: true
        run: |
          set -eu
          pip install --quiet pip-audit
          # Scan every requirements*.txt under python/. Use --disable-pip so the
          # audit does not try to resolve transitive trees through the network
          # beyond the vulnerability DB itself (faster, deterministic).
          shopt -s nullglob
          status=0
          for req in python/requirements*.txt; do
            echo "::group::pip-audit ${req}"
            pip-audit --requirement "${req}" --strict --progress-spinner=off || status=$?
            echo "::endgroup::"
          done
          if [ "$status" != "0" ]; then
            echo "::warning::pip-audit reported vulnerabilities (advisory, not blocking)"
          fi

      # --- PHP dependency audit -------------------------------------------
      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2
          coverage: none

      - name: composer audit (PHP deps, advisory)
        continue-on-error: true
        run: |
          set -eu
          if [ -f composer.lock ]; then
            composer audit --no-dev --format=plain || true
          else
            echo "no composer.lock at root; running install-less audit"
            composer audit --format=plain || true
          fi

  # W2-S3 — Unified CI summary. Aggregates all upstream job results into a single
  # check that PR reviewers can read at a glance. Required jobs failing → summary
  # fails. Advisory jobs (php-style, python-lint) surface their status but do not
  # block until their respective Phase-2 flip (W4-S1 Phase 2 etc).
  ci-summary:
    needs:
      - bridge-and-contract
      - orchestrator-smoke
      - audit-full
      - php-style
      - python-lint
      - security-audit
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Render summary
        env:
          BRIDGE: ${{ needs.bridge-and-contract.result }}
          SMOKE: ${{ needs.orchestrator-smoke.result }}
          AUDIT: ${{ needs.audit-full.result }}
          STYLE: ${{ needs.php-style.result }}
          LINT: ${{ needs.python-lint.result }}
          SECAUDIT: ${{ needs.security-audit.result }}
        run: |
          set -eu
          icon() {
            case "$1" in
              success) echo "✅";;
              failure) echo "❌";;
              cancelled) echo "🛑";;
              skipped) echo "⏭️";;
              *) echo "❓";;
            esac
          }
          {
            echo "# OAAO CI Summary"
            echo ""
            echo "| Job | Status | Gate |"
            echo "| --- | --- | --- |"
            echo "| bridge-and-contract | $(icon "$BRIDGE") $BRIDGE | required |"
            echo "| orchestrator-smoke  | $(icon "$SMOKE")  $SMOKE  | required |"
            echo "| audit-full          | $(icon "$AUDIT")  $AUDIT  | required |"
            echo "| php-style           | $(icon "$STYLE")  $STYLE  | advisory (W2-S2) |"
            echo "| python-lint         | $(icon "$LINT")   $LINT   | required (ruff hard-fail, W4-S1 P2) |"
            echo "| security-audit      | $(icon "$SECAUDIT") $SECAUDIT | advisory (W11-S3 P1) |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        env:
          BRIDGE: ${{ needs.bridge-and-contract.result }}
          SMOKE: ${{ needs.orchestrator-smoke.result }}
          AUDIT: ${{ needs.audit-full.result }}
          LINT: ${{ needs.python-lint.result }}
        run: |
          set -eu
          fail=0
          for r in "$BRIDGE" "$SMOKE" "$AUDIT" "$LINT"; do
            case "$r" in
              success) ;;
              skipped) ;;
              *) fail=1;;
            esac
          done
          if [ "$fail" = "1" ]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi
          echo "All required jobs passed."
