<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18.16 18.54" width="120" height="120" aria-label="Loading" role="img">
  <style>
    .shape {
      fill: #2a2a28;
      transform-box: fill-box;
      transform-origin: center;
    }

    @media (prefers-color-scheme: dark) {
      .shape {
        fill: #f5f5f4;
      }
    }

    /* O top-left */
    .o-top {
      animation: pulse 1.6s ease-in-out infinite;
      animation-delay: 0s;
    }

    /* A top-right */
    .a-top {
      animation: pulse 1.6s ease-in-out infinite;
      animation-delay: 0.4s;
    }

    /* O bottom-right */
    .o-bottom {
      animation: pulse 1.6s ease-in-out infinite;
      animation-delay: 0.8s;
    }

    /* A bottom-left */
    .a-bottom {
      animation: pulse 1.6s ease-in-out infinite;
      animation-delay: 1.2s;
    }

    @keyframes pulse {
      0%   { opacity: 0.15; transform: scale(0.85); }
      50%  { opacity: 1;    transform: scale(1.05); }
      100% { opacity: 0.15; transform: scale(0.85); }
    }

    @media (prefers-reduced-motion: reduce) {
      .o-top, .a-top, .o-bottom, .a-bottom {
        animation: none;
        opacity: 0.85;
        transform: none;
      }
    }
  </style>

  <g fill="currentColor">
    <!-- A top-right -->
    <path class="shape a-top"
      d="M13.71,0h.12l4.33,8.72h-1.49l-.77-1.63h-4.27l-.81,1.63h-1.45L13.71,0ZM15.32,5.89l-1.56-3.29-1.54,3.29h3.1Z"/>

    <!-- A bottom-left -->
    <path class="shape a-bottom"
      d="M4.33,9.59h.12l4.33,8.72h-1.49l-.77-1.63H2.26l-.81,1.63H0l4.33-8.72ZM5.95,15.48l-1.56-3.29-1.54,3.29h3.1Z"/>

    <!-- O top-left -->
    <path class="shape o-top"
      d="M4.39.02C1.99.02.05,1.97.05,4.37s1.94,4.34,4.34,4.34,4.35-1.94,4.35-4.34S6.79.02,4.39.02ZM4.39,7.44c-1.69,0-3.07-1.38-3.07-3.07s1.38-3.07,3.07-3.07,3.07,1.37,3.07,3.07-1.37,3.07-3.07,3.07Z"/>

    <!-- O bottom-right -->
    <path class="shape o-bottom"
      d="M13.69,9.85c-2.4,0-4.34,1.95-4.34,4.35s1.94,4.34,4.34,4.34,4.35-1.94,4.35-4.34-1.95-4.35-4.35-4.35ZM13.69,17.27c-1.69,0-3.07-1.38-3.07-3.07s1.38-3.07,3.07-3.07,3.07,1.37,3.07,3.07-1.37,3.07-3.07,3.07Z"/>
  </g>
</svg>
