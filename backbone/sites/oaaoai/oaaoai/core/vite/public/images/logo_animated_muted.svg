<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 18.16 18.54" width="16" height="16" aria-hidden="true">
  <style>
    .shape {
      fill: #b8b7b3;
      transform-box: fill-box;
      transform-origin: center;
    }

    .o-top { animation: pulse 1.6s ease-in-out infinite; animation-delay: 0s; }
    .a-top { animation: pulse 1.6s ease-in-out infinite; animation-delay: 0.4s; }
    .o-bottom { animation: pulse 1.6s ease-in-out infinite; animation-delay: 0.8s; }
    .a-bottom { animation: pulse 1.6s ease-in-out infinite; animation-delay: 1.2s; }

    @keyframes pulse {
      0%   { opacity: 0.35; transform: scale(0.9); }
      50%  { opacity: 0.85; transform: scale(1); }
      100% { opacity: 0.35; transform: scale(0.9); }
    }

    @media (prefers-reduced-motion: reduce) {
      .o-top, .a-top, .o-bottom, .a-bottom {
        animation: none;
        opacity: 0.65;
        transform: none;
      }
    }
  </style>

